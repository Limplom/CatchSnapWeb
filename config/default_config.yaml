# CatchSnapWeb - Default Configuration

# Browser settings
browser:
  default: chrome
  headless: false
  viewport:
    width: 1080
    height: 720
    responsive: true  # true = adapts to window size, false = fixed size

# Download settings
downloads:
  blob_download_enabled: true
  download_dir: Downloads    # Central download folder (relative to project directory or absolute path)
  max_retries: 10             # More attempts for progressive JPEGs
  retry_backoff_max: 8      # Longer maximum backoff (seconds)
  retry_backoff_base: 0.0    # Base delay between retries
  chunk_size: 65536          # 64KB
  parallel_downloads: 10
  settle_time: 0.0           # Wait time BEFORE queue addition (DISABLED due to race condition)
  delays:
    video: 0.0               # Immediate download, retries handle progressive loading
    image: 0.0               # Immediate download, retries handle progressive JPEGs
    other: 0.0

# Validation
validation:
  min_file_size: 100     # Bytes
  validate_formats: true

# Storage
storage:
  output_dir: traffic_logs
  auto_save_interval: 60  # Seconds
  log_rotation_size: 50   # MB
  min_free_space: 1024    # MB

# Filters
filters:
  enabled: false
  domain_whitelist: []
  domain_blacklist: []
  content_types: []

# Logging
logging:
  level: DEBUG  # DEBUG for detailed blob response analysis
  format: json
  console_output: true
  file_output: true

# Session settings
session:
  timeout: 3600  # Seconds (3600 = 1 hour, 0 = no timeout)

# Features
features:
  har_recording: true
  metadata_extraction: false
  progress_bar: true
  csv_export: false
